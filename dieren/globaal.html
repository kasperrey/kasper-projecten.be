<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dieren Raadspel - Globaal</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/NavigatieBar.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            background-color: #f9f9f9;
        }
        /* Expanded the game container width to give the tree breathing room */
        .game-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        /* Kept the question card neat and centered */
        .card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin: 0 auto 40px auto;
            max-width: 600px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        input[type="text"] {
            padding: 8px;
            width: 80%;
            font-size: 16px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .hidden {
            display: none;
        }

        /* --- CSS Boom Structuur Visualisatie (Bigger Layout) --- */
        .tree-container {
            background: #ffffff;
            padding: 40px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: left;
            margin-bottom: 40px;
            width: 100%;
            box-sizing: border-box;

            /* Enable scrollbars only if the tree extends past 1200px wide */
            overflow-x: auto;
            overflow-y: hidden;
        }
        .tree-container h3 {
            text-align: center;
            margin-top: 0;
            color: #333;
            font-size: 22px;
        }
        /* Forces the tree wrapper to maintain its true calculated width */
        .tree {
            display: inline-block;
            min-width: 100%;
            text-align: center;
        }
        .tree ul {
            padding-top: 30px;
            position: relative;
            transition: all 0.5s;
            display: flex;
            justify-content: center;
        }
        .tree li {
            float: left;
            text-align: center;
            list-style-type: none;
            position: relative;
            padding: 30px 15px 0 15px; /* Increased padding to separate nodes further */
            transition: all 0.5s;
        }
        /* Connectie-lijnen via pseudo-elementen */
        .tree li::before, .tree li::after {
            content: '';
            position: absolute;
            top: 0;
            right: 50%;
            border-top: 2px solid #ccc;
            width: 50%;
            height: 30px; /* Taller connections */
        }
        .tree li::after {
            right: auto;
            left: 50%;
            border-left: 2px solid #ccc;
        }
        .tree li:only-child::after, .tree li:only-child::before {
            display: none;
        }
        .tree li:only-child {
            padding-top: 0;
        }
        .tree li:first-child::before, .tree li:last-child::after {
            border: 0 none;
        }
        .tree li:last-child::before {
            border-right: 2px solid #ccc;
            border-radius: 0 5px 0 0;
        }
        .tree li:first-child::after {
            border-radius: 5px 0 0 0;
        }
        .tree ul ul::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            border-left: 2px solid #ccc;
            width: 0;
            height: 30px; /* Taller connections */
        }
        /* Grafische Node Elementen */
        .tree li .node-box {
            border: 2px solid #ccc;
            padding: 10px 18px; /* Slightly larger padding inside boxes */
            text-decoration: none;
            color: #444;
            font-size: 14px;
            display: inline-block;
            border-radius: 5px;
            transition: all 0.5s;
            background: #fff;
            white-space: nowrap; /* Prevents long questions from wrapping awkwardly */
        }
        .tree li .question-node {
            background-color: #e2f0fe;
            border-color: #b6d4fe;
            color: #084298;
            font-weight: bold;
        }
        .tree li .animal-node {
            background-color: #e2f0d9;
            border-color: #c5e1a5;
            color: #2e7d32;
        }
        .branch-label {
            font-size: 11px;
            color: #888;
            display: block;
            margin-top: -22px;
            margin-bottom: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul class="nav">
                <li class="nav"><a href="../index.html">Home</a></li>
                <li class="nav"><a href="../games.html">Games</a></li>
                <li class="nav"><a href="../nieuws.html">Nieuws</a></li>
                <li class="nav" style="float:right"><a href="../about.html">Over</a></li>
            </ul>
        </nav>
    </header>

    <div class="game-container">
        <div class="card">
            <h2 id="game-text">Laden...</h2>

            <div id="action-buttons" class="hidden">
                <button onclick="handleAnswer(true)">Ja</button>
                <button onclick="handleAnswer(false)">Nee</button>
            </div>

            <div id="start-interface" class="hidden">
                <button onclick="startRound()">Ik ben er klaar voor!</button>
            </div>

            <div id="learn-interface" class="hidden">
                <input type="text" id="input-field" placeholder="">
                <br>
                <button onclick="submitLearnStep()">Volgende</button>
            </div>
        </div>

        <div class="tree-container">
            <h3>Huidige Kennisboom (Cloud Live)</h3>
            <div class="tree" id="tree-display"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    class Node {
        constructor(key) {
            this.key = key;
            this.left = null;
            this.right = null;
        }
    }

    const SUPABASE_URL = "https://uqrjzaawcnuhacxjmadj.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxcmp6YWF3Y251aGFjeGptYWRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0Mjc4NTcsImV4cCI6MjA5NzAwMzg1N30.HPAW69KnT7U1ePSWx21aECl5L9a9XbPqzbXghanYvxo";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let root = null;
    let currentNode = null;
    let parentNode = null;
    let currentDirection = '';

    let learnState = 0;
    let newAnimal = '';
    let newQuestion = '';

    const gameText = document.getElementById('game-text');
    const actionButtons = document.getElementById('action-buttons');
    const startInterface = document.getElementById('start-interface');
    const learnInterface = document.getElementById('learn-interface');
    const inputField = document.getElementById('input-field');
    const treeDisplay = document.getElementById('tree-display');

    function treeToObjects(node) {
        if (!node) return null;
        return {
            key: node.key,
            left: treeToObjects(node.left),
            right: treeToObjects(node.right)
        };
    }

    function objectsToTree(obj) {
        if (!obj) return null;
        let node = new Node(obj.key);
        node.left = objectsToTree(obj.left);
        node.right = objectsToTree(obj.right);
        return node;
    }

    function renderTreeVisual() {
        treeDisplay.innerHTML = '';
        if (!root) return;

        const masterUl = document.createElement('ul');
        masterUl.appendChild(createHtmlBranch(root, ''));
        treeDisplay.appendChild(masterUl);
    }

    function createHtmlBranch(node, labelText) {
        const li = document.createElement('li');
        const box = document.createElement('div');
        box.className = 'node-box';

        if (node.left === null && node.right === null) {
            box.classList.add('animal-node');
            box.innerText = node.key;
        } else {
            box.classList.add('question-node');
            box.innerText = node.key;
        }

        if (labelText) {
            const span = document.createElement('span');
            span.className = 'branch-label';
            span.innerText = labelText;
            li.appendChild(span);
        }

        li.appendChild(box);

        if (node.left || node.right) {
            const subUl = document.createElement('ul');
            if (node.left) subUl.appendChild(createHtmlBranch(node.left, 'Ja'));
            if (node.right) subUl.appendChild(createHtmlBranch(node.right, 'Nee'));
            li.appendChild(subUl);
        }

        return li;
    }

    async function saveTree() {
        try {
            const updatedTreeData = treeToObjects(root);
            const { error } = await supabaseClient
                .from('game_data')
                .update({ tree_json: updatedTreeData })
                .eq('id', 1);

            if (error) throw error;
            renderTreeVisual();
        } catch (error) {
            console.error("Error saving global tree to Supabase:", error);
        }
    }

    async function initGame() {
        gameText.innerText = "Kennis ophalen van de cloud...";
        try {
            const { data, error } = await supabaseClient
                .from('game_data')
                .select('tree_json');

            if (error) throw error;

            if (!data || data.length === 0) {
                root = new Node("mug");
                await supabaseClient.from('game_data').insert([{ id: 1, tree_json: treeToObjects(root) }]);
            } else {
                root = objectsToTree(data[0].tree_json);
            }

            renderTreeVisual();
            showStartScreen();
        } catch (error) {
            console.error("Error fetching tree from Supabase:", error);
            gameText.innerText = "Fout bij laden van de cloud.";
        }
    }

    function showStartScreen() {
        actionButtons.classList.add('hidden');
        learnInterface.classList.add('hidden');
        startInterface.classList.remove('hidden');
        gameText.innerText = "Bedenk een dier in je hoofd...";
    }

    function startRound() {
        startInterface.classList.add('hidden');
        currentNode = root;
        parentNode = null;
        currentDirection = '';
        evaluateCurrentNode();
    }

    function evaluateCurrentNode() {
        if (currentNode.left === null && currentNode.right === null) {
            gameText.innerText = `Is het een ${currentNode.key}?`;
            actionButtons.classList.remove('hidden');
        } else {
            gameText.innerText = `${currentNode.key}`;
            actionButtons.classList.remove('hidden');
        }
    }

    function handleAnswer(isYes) {
        if (currentNode.left === null && currentNode.right === null) {
            if (isYes) {
                gameText.innerText = "Ik heb gewonnen! 🎉";
                actionButtons.classList.add('hidden');
                setTimeout(showStartScreen, 2500);
            } else {
                actionButtons.classList.add('hidden');
                startLearningWizard();
            }
        } else {
            parentNode = currentNode;
            if (isYes) {
                currentDirection = 'left';
                currentNode = currentNode.left;
            } else {
                currentDirection = 'right';
                currentNode = currentNode.right;
            }
            evaluateCurrentNode();
        }
    }

    function startLearningWizard() {
        learnState = 1;
        learnInterface.classList.remove('hidden');
        gameText.innerText = "Ik geef het op. Welk dier had je in gedachten?";
        inputField.value = "";
        inputField.placeholder = "Bijv. olifant";
        inputField.focus();
    }

    function submitLearnStep() {
        let value = inputField.value.trim().toLowerCase();
        if (!value) return;

        if (learnState === 1) {
            newAnimal = value;
            learnState = 2;
            gameText.innerText = `Welke ja/nee-vraag onderscheidt een ${newAnimal} van een ${currentNode.key}?`;
            inputField.value = "";
            inputField.placeholder = "Bijv. Heeft het dier een slurf?";
            inputField.focus();
        }
        else if (learnState === 2) {
            newQuestion = value;
            newQuestion = newQuestion.charAt(0).toUpperCase() + newQuestion.slice(1);
            if (!newQuestion.endsWith('?')) newQuestion += '?';

            learnState = 3;
            learnInterface.classList.add('hidden');
            gameText.innerText = `Wat is het juiste antwoord op die vraag voor een ${newAnimal}?`;
            actionButtons.classList.remove('hidden');
        }
    }

    async function handleFinalLearnAnswer(isYes) {
        let animalNode = new Node(newAnimal);
        let questionNode = new Node(newQuestion);

        questionNode.left = isYes ? animalNode : currentNode;
        questionNode.right = isYes ? currentNode : animalNode;

        if (!parentNode) {
            root = questionNode;
        } else {
            if (currentDirection === 'left') {
                parentNode.left = questionNode;
            } else {
                parentNode.right = questionNode;
            }
        }

        await saveTree();
        gameText.innerText = `Bedankt! Ik heb geleerd over de ${newAnimal}.`;
        actionButtons.classList.add('hidden');
        setTimeout(showStartScreen, 2500);
    }

    const originalHandleAnswer = handleAnswer;
    handleAnswer = function(isYes) {
        if (learnState === 3) {
            learnState = 0;
            handleFinalLearnAnswer(isYes);
        } else {
            originalHandleAnswer(isYes);
        }
    };

    inputField.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            submitLearnStep();
        }
    });

    window.onload = initGame;
</script>
</body>
</html>
